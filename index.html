<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Dia do Trabalhador | Alpha Clicheria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{
  background: radial-gradient(circle at top,#005baa,#001b3d 70%);
  color:#fff;
  min-height:100vh;
  overflow-x:hidden;
}
.hero{
  min-height:60vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:30px;
  position:relative;
}
.hero::before{
  content:'';
  position:absolute;
  width:500px;
  height:500px;
  background:rgba(255,255,255,0.05);
  border-radius:50%;
  filter:blur(80px);
}
.logo{
  max-width:180px;
  margin-bottom:25px;
  z-index:2;
  animation:pulse 3s infinite ease-in-out;
}
@keyframes pulse{
  0%{transform:scale(1); opacity:0.95;}
  50%{transform:scale(1.05); opacity:1;}
  100%{transform:scale(1); opacity:0.95;}
}
h1{font-size:2.5rem;font-weight:700;z-index:2;}
p.sub{font-size:1.1rem;max-width:650px;margin-top:15px;opacity:.9;z-index:2;}
.icons{
  margin-top:25px;
  display:flex;
  gap:25px;
  font-size:2rem;
  z-index:2;
}
.scroll-hint{
  margin-top:30px;
  font-size:1rem;
  opacity:.8;
  animation:bounce 1.8s infinite;
  z-index:2;
}
@keyframes bounce{
  0%,20%,50%,80%,100%{transform:translateY(0);}
  40%{transform:translateY(8px);}
  60%{transform:translateY(4px);}
}
.counter{
  text-align:center;
  margin-top:10px;
  font-size:1.1rem;
}
.scratch-section{
  display:flex;
  justify-content:center;
  padding:40px 20px 80px;
}
.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:25px;
  width:100%;
  max-width:420px;
  padding:30px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,.25);
}
.card h2{margin-bottom:20px;}
#scratch-container{
  position:relative;
  width:100%;
  height:220px;
  border-radius:20px;
  overflow:hidden;
}
#message{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(135deg,#ffffff,#dcecff);
  color:#005baa;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
  font-size:1.4rem;
  font-weight:700;
}
canvas{
  position:absolute;
  top:0;
  left:0;
}
.float{
  position:fixed;
  font-size:1.5rem;
  animation:floatUp linear infinite;
  opacity:.15;
}
@keyframes floatUp{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}
</style>
</head>
<body>
<div class="hero">
<img src="logo-alpha.png" class="logo">
<h1>Feliz Dia do Trabalhador</h1>
<p class="sub">Celebramos hoje quem constrói nossa história todos os dias com dedicação, talento e esforço.</p>
<div class="icons">🍦 🍫 🎉 💙</div>
<div class="scroll-hint">⬇ Arraste para baixo para revelar sua mensagem! ⬇</div>
</div>

<div class="counter">✨ <span id="count">0</span> colaboradores já revelaram sua mensagem</div>

<div class="scratch-section">
<div class="card">
<h2>Raspe para revelar ✨</h2>
<div id="scratch-container">
<div id="message"></div>
<canvas id="scratch"></canvas>
</div>
</div>
</div>

<script>
const mensagens = [
'Você faz a diferença todos os dias! 💙',
'Obrigado por construir nossa história! 🚀',
'Seu esforço adoça nossos resultados! 🍦',
'Você é parte essencial da Alpha! ✨',
'Hoje é dia de celebrar você! 🎉'
];

document.getElementById('message').innerText = mensagens[Math.floor(Math.random()*mensagens.length)];

let count = localStorage.getItem('alphaCount') || 43;
count++;
localStorage.setItem('alphaCount', count);
document.getElementById('count').innerText = count;

const canvas = document.getElementById('scratch');
const ctx = canvas.getContext('2d');
const container = document.getElementById('scratch-container');

function resize(){
canvas.width = container.offsetWidth;
canvas.height = container.offsetHeight;
ctx.fillStyle = '#c0c0c0';
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle = '#fff';
ctx.font = 'bold 24px Poppins';
ctx.textAlign = 'center';
ctx.fillText('RASPE AQUI', canvas.width/2, canvas.height/2);
ctx.globalCompositeOperation = 'destination-out';
}
resize();
window.addEventListener('resize', resize);

let isDrawing = false;

function scratch(x,y){
ctx.beginPath();
ctx.arc(x,y,25,0,Math.PI*2);
ctx.fill();
}

canvas.addEventListener('mousedown', ()=>isDrawing=true);
canvas.addEventListener('mouseup', ()=>isDrawing=false);
canvas.addEventListener('mouseleave', ()=>isDrawing=false);

canvas.addEventListener('mousemove', e=>{
if(!isDrawing) return;
const rect=canvas.getBoundingClientRect();
scratch(e.clientX-rect.left,e.clientY-rect.top);
});

canvas.addEventListener('touchstart', (e)=>{
  isDrawing = true;
  document.body.style.overflow = 'hidden';
  e.preventDefault();
}, { passive:false });

canvas.addEventListener('touchend', ()=>{
  isDrawing = false;
  document.body.style.overflow = 'auto';
});

canvas.addEventListener('touchmove', (e)=>{
  if(!isDrawing) return;
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  scratch(touch.clientX-rect.left,touch.clientY-rect.top);
  e.preventDefault();
}, { passive:false });

const emojis=['🍦','🍫','✨','🎉'];
for(let i=0;i<12;i++){
const el=document.createElement('div');
el.className='float';
el.innerText=emojis[Math.floor(Math.random()*emojis.length)];
el.style.left=Math.random()*100+'vw';
el.style.animationDuration=(8+Math.random()*8)+'s';
el.style.fontSize=(20+Math.random()*25)+'px';
document.body.appendChild(el);
}
</script>
</body>
</html>
